<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Tracker — Manager Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0f0f1a; color: #fff; font-family: 'Nunito', sans-serif; }

    /* ── Login screen ── */
    #login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%; max-width: 360px;
    }
    .login-logo  { font-family: 'Fredoka One', cursive; font-size: 28px; color: #e63946; margin-bottom: 4px; }
    .login-sub   { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 32px; }
    .login-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .login-input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px;
      padding: 13px 14px; font-family: 'Nunito', sans-serif; font-size: 16px;
      color: #fff; outline: none; transition: border-color 0.15s; margin-bottom: 16px;
    }
    .login-input:focus { border-color: #54A0FF; }
    .login-btn {
      width: 100%; background: #e63946; border: none; border-radius: 12px;
      padding: 15px; font-family: 'Fredoka One', cursive; font-size: 20px;
      color: #fff; cursor: pointer; transition: opacity 0.15s;
    }
    .login-btn:hover   { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .login-error {
      margin-top: 14px; padding: 10px 14px; border-radius: 8px;
      background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.3);
      color: #e63946; font-size: 13px; text-align: center; display: none;
    }
    #app-screen  { display: none; }
    #login-screen { display: flex; }

    .header {
      background: #1a1a2e;
      border-bottom: 2px solid rgba(255,255,255,0.08);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-family: 'Fredoka One', cursive; font-size: 22px; color: #e63946; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .badge {
      background: rgba(84,160,255,0.15); border: 1px solid rgba(84,160,255,0.4);
      color: #54A0FF; border-radius: 6px; padding: 4px 12px;
      font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .refresh-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.45); border-radius: 8px; padding: 7px 16px;
      font-family: 'Nunito', sans-serif; font-size: 13px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

    .main { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    /* KPI row */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .kpi-card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 18px 20px;
    }
    .kpi-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; font-weight: 700; }
    .kpi-value { font-family: 'Fredoka One', cursive; font-size: 34px; line-height: 1; }
    .kpi-sub   { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }

    /* Section label */
    .section-label {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 12px; font-weight: 700;
    }

    /* Two-column layout */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 16px; overflow: hidden;
    }
    .card-header {
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 12px 18px;
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6);
    }
    .card-body { padding: 16px 18px; }

    /* Bar chart */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 13px; color: rgba(255,255,255,0.6); min-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .bar-num   { font-family: 'Fredoka One', cursive; font-size: 14px; min-width: 36px; text-align: right; }

    /* Age breakdown */
    .age-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .age-row:last-child { border-bottom: none; }
    .age-name { font-size: 14px; font-weight: 700; }
    .age-right { display: flex; align-items: center; gap: 14px; }
    .age-count { font-family: 'Fredoka One', cursive; font-size: 20px; }
    .age-pct   { font-size: 12px; color: rgba(255,255,255,0.3); min-width: 36px; text-align: right; }

    /* Trend table */
    .trend-wrap { overflow-x: auto; }
    table.trend-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.trend-tbl th {
      padding: 9px 12px; text-align: left;
      font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    table.trend-tbl td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    table.trend-tbl tr:last-child td { border-bottom: none; }
    .trend-date  { font-family: 'Fredoka One', cursive; font-size: 15px; }
    .trend-num   { font-family: 'Fredoka One', cursive; font-size: 15px; color: #FFD700; }
    .trend-ft    { font-size: 13px; color: rgba(255,215,0,0.55); }
    .today-badge {
      display: inline-block; margin-left: 7px;
      background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3);
      color: #FFD700; border-radius: 4px; padding: 1px 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      font-family: 'Nunito', sans-serif; vertical-align: middle;
    }

    .empty { padding: 32px; text-align: center; color: rgba(255,255,255,0.2); font-size: 13px; }

    /* ── Filter bar ── */
    .filter-bar {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex; flex-wrap: wrap; align-items: flex-end; gap: 14px;
      margin-bottom: 24px;
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .filter-input {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 10px;
      font-family: 'Nunito', sans-serif; font-size: 13px; color: #fff;
      outline: none; transition: border-color 0.15s;
      width: 140px;
    }
    .filter-input[type="number"] { width: 80px; }
    .filter-input:focus { border-color: #54A0FF; }
    .filter-input::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    .filter-actions { display: flex; gap: 8px; align-items: flex-end; margin-left: auto; }
    .filter-apply-btn {
      background: #54A0FF; border: none; border-radius: 8px;
      padding: 9px 18px; font-family: 'Nunito', sans-serif; font-size: 13px;
      font-weight: 700; color: #fff; cursor: pointer; transition: opacity 0.15s;
      white-space: nowrap;
    }
    .filter-apply-btn:hover { opacity: 0.85; }
    .filter-clear-btn {
      background: transparent; border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 9px 14px;
      font-family: 'Nunito', sans-serif; font-size: 13px;
      color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-clear-btn:hover { border-color: #e63946; color: #e63946; }
    .filter-active-badge {
      display: inline-flex; align-items: center;
      background: rgba(84,160,255,0.12); border: 1px solid rgba(84,160,255,0.3);
      color: #54A0FF; border-radius: 6px; padding: 3px 9px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      margin-left: 8px; vertical-align: middle;
    }
  </style>
</head>
<body>

<!-- Login screen (visible by default, hidden after successful login) -->
<div id="login-screen" style="display:flex">
  <div class="login-card">
    <div class="login-logo">Guest Tracker</div>
    <div class="login-sub">Manager Dashboard</div>
    <div class="login-label">Password</div>
    <input id="login-pw" class="login-input" type="password" placeholder="Enter password…" autocomplete="current-password" />
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password — try again</div>
  </div>
</div>

<!-- Dashboard (shown after login) -->
<div id="app-screen">
<div class="header">
  <div>
    <div class="header-title">Guest Tracker</div>
    <div class="header-sub">Manager Dashboard</div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="load()">Refresh</button>
    <button class="refresh-btn" onclick="logout()" style="border-color:rgba(230,57,70,0.3);color:rgba(230,57,70,0.6)">Sign Out</button>
    <div class="badge">Manager</div>
  </div>
</div>

<div class="main">

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <div class="filter-label">Date From</div>
      <input id="f-date-from" class="filter-input" type="date" />
    </div>
    <div class="filter-group">
      <div class="filter-label">Date To</div>
      <input id="f-date-to" class="filter-input" type="date" />
    </div>
    <div class="filter-group">
      <div class="filter-label">Hour From</div>
      <input id="f-hour-from" class="filter-input" type="number" min="0" max="23" placeholder="0" />
    </div>
    <div class="filter-group">
      <div class="filter-label">Hour To</div>
      <input id="f-hour-to" class="filter-input" type="number" min="0" max="23" placeholder="23" />
    </div>
    <div class="filter-actions">
      <button class="filter-clear-btn" onclick="clearFilters()">Clear</button>
      <button class="filter-apply-btn" onclick="load()">Apply</button>
    </div>
  </div>

  <!-- KPI cards -->
  <div class="kpi-row" id="kpi-row">
    <div class="kpi-card"><div class="kpi-label">Loading</div><div class="kpi-value" style="color:rgba(255,255,255,0.15)">…</div></div>
  </div>

  <!-- Age breakdown + Peak hours -->
  <div class="grid-2">
    <div>
      <div class="section-label">Age Breakdown <span id="lbl-age"></span></div>
      <div class="card"><div class="card-body" id="age-breakdown"><div class="empty">Loading…</div></div></div>
    </div>
    <div>
      <div class="section-label">Peak Hours <span id="lbl-hours"></span></div>
      <div class="card"><div class="card-body" id="peak-hours"><div class="empty">Loading…</div></div></div>
    </div>
  </div>

  <!-- Top residences + Daily trend -->
  <div class="grid-2">
    <div>
      <div class="section-label">Top Residences <span id="lbl-res"></span></div>
      <div class="card"><div class="card-body" id="top-residence"><div class="empty">Loading…</div></div></div>
    </div>
    <div>
      <div class="section-label">Daily Guest Trend</div>
      <div class="card">
        <div class="trend-wrap">
          <table class="trend-tbl">
            <thead><tr><th>Date</th><th>Guests</th><th>★ First-Time</th></tr></thead>
            <tbody id="trend-body"><tr><td colspan="3" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>
</div><!-- /#app-screen -->

<script>
  // ── Auth ──────────────────────────────────────────────────────────────────
  const TOKEN_KEY = 'dash_token';

  function getToken() { return sessionStorage.getItem(TOKEN_KEY); }

  function showApp()   { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block'; }
  function showLogin() { document.getElementById('login-screen').style.display = 'flex';  document.getElementById('app-screen').style.display = 'none'; }

  async function doLogin() {
    const pw  = document.getElementById('login-pw').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    if (!pw) return;
    btn.disabled = true;
    err.style.display = 'none';
    try {
      const res  = await fetch('/api/dashboard-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (!res.ok) { err.style.display = ''; btn.disabled = false; return; }
      const { token } = await res.json();
      sessionStorage.setItem(TOKEN_KEY, token);
      document.getElementById('login-pw').value = '';
      showApp();
      load();
    } catch(e) { err.style.display = ''; btn.disabled = false; }
  }

  function logout() {
    sessionStorage.removeItem(TOKEN_KEY);
    showLogin();
  }

  // Allow Enter key on password field
  document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // On page load — check for existing valid token
  if (getToken()) { showApp(); load(); }
  // else: login-screen is already visible via inline style — no action needed

  async function apiFetch(url) {
    const res = await fetch(url, { headers: { 'x-dash-token': getToken() || '' } });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    return res.json();
  }

  // ── Dashboard data ─────────────────────────────────────────────────────────
  const today = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD

  const AGE_KEYS   = ['toddler','preschool','school_age','teen','adult'];
  const AGE_LABELS = { toddler:'Toddler', preschool:'Preschool', school_age:'School Age', teen:'Teen', adult:'Adult' };
  const AGE_COLORS = { toddler:'#FF6B9D', preschool:'#FF9F43', school_age:'#54A0FF', teen:'#A29BFE', adult:'#00CEC9' };

  function fmt(n) { return (n ?? 0).toLocaleString(); }
  function pct(a, b) { return b ? Math.round((a / b) * 100) : 0; }
  function hourLabel(h) { return String(h).padStart(2,'0') + ':00'; }

  function getFilters() {
    const df = document.getElementById('f-date-from').value;
    const dt = document.getElementById('f-date-to').value;
    const hf = document.getElementById('f-hour-from').value;
    const ht = document.getElementById('f-hour-to').value;
    return { date_from: df, date_to: dt, hour_from: hf, hour_to: ht };
  }

  function clearFilters() {
    document.getElementById('f-date-from').value = '';
    document.getElementById('f-date-to').value   = '';
    document.getElementById('f-hour-from').value = '';
    document.getElementById('f-hour-to').value   = '';
    load();
  }

  function filterLabel(f) {
    const parts = [];
    if (f.date_from || f.date_to) {
      parts.push((f.date_from || '…') + ' → ' + (f.date_to || '…'));
    }
    if (f.hour_from !== '' || f.hour_to !== '') {
      const hf = f.hour_from !== '' ? String(f.hour_from).padStart(2,'0') + ':00' : '00:00';
      const ht = f.hour_to   !== '' ? String(f.hour_to).padStart(2,'0')   + ':00' : '23:00';
      parts.push(hf + ' – ' + ht);
    }
    return parts.length ? '<span class="filter-active-badge">' + parts.join(' · ') + '</span>' : '— All Time';
  }

  async function load() {
    const f   = getFilters();
    const qs  = new URLSearchParams();
    if (f.date_from) qs.set('date_from', f.date_from);
    if (f.date_to)   qs.set('date_to',   f.date_to);
    if (f.hour_from !== '') qs.set('hour_from', f.hour_from);
    if (f.hour_to   !== '') qs.set('hour_to',   f.hour_to);
    const url = '/api/dashboard' + (qs.toString() ? '?' + qs : '');
    const lbl = filterLabel(f);
    ['lbl-age','lbl-hours','lbl-res'].forEach(id => document.getElementById(id).innerHTML = lbl);

    try {
      const d = await apiFetch(url);
      renderKPIs(d);
      renderAge(d.totals, d.today);
      renderPeakHours(d.byHour);
      renderResidence(d.byResidence);
      renderTrend(d.byDay);
    } catch(e) {
      document.getElementById('kpi-row').innerHTML =
        '<div style="color:#e63946;padding:20px">Cannot reach server — is it running?</div>';
    }
  }

  function renderKPIs(d) {
    const t  = d.totals  || {};
    const td = d.today   || {};
    const ftPct = t.total_guests ? Math.round((t.total_first_time / t.total_guests) * 100) : 0;

    document.getElementById('kpi-row').innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">Today's Guests</div>
        <div class="kpi-value" style="color:#FFD700">${fmt(td.guests)}</div>
        <div class="kpi-sub">★ ${fmt(td.first_time)} first-time</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">All-Time Guests</div>
        <div class="kpi-value" style="color:#54A0FF">${fmt(t.total_guests)}</div>
        <div class="kpi-sub">${fmt(t.total_days)} days tracked</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">First-Time Visits</div>
        <div class="kpi-value" style="color:#A29BFE">${fmt(t.total_first_time)}</div>
        <div class="kpi-sub">${ftPct}% of all guests</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg / Day</div>
        <div class="kpi-value" style="color:#00CEC9">${t.total_days ? Math.round(t.total_guests / t.total_days) : 0}</div>
        <div class="kpi-sub">guests per open day</div>
      </div>`;
  }

  function renderAge(totals, td) {
    const t   = totals || {};
    const all = t.total_guests || 0;
    const rows = AGE_KEYS.map(k => {
      const count = t['total_' + k] || 0;
      const p     = pct(count, all);
      return `
        <div class="age-row">
          <div class="age-name" style="color:${AGE_COLORS[k]}">${AGE_LABELS[k]}</div>
          <div class="age-right">
            <div class="bar-track" style="width:80px">
              <div class="bar-fill" style="width:${p}%;background:${AGE_COLORS[k]}"></div>
            </div>
            <div class="age-count" style="color:${AGE_COLORS[k]}">${fmt(count)}</div>
            <div class="age-pct">${p}%</div>
          </div>
        </div>`;
    }).join('');
    document.getElementById('age-breakdown').innerHTML = rows || '<div class="empty">No data yet.</div>';
  }

  function renderPeakHours(byHour) {
    if (!byHour || !byHour.length) {
      document.getElementById('peak-hours').innerHTML = '<div class="empty">No data yet.</div>';
      return;
    }
    const max = Math.max(...byHour.map(r => r.guests));
    const rows = byHour.map(r => {
      const w = max ? Math.round((r.guests / max) * 100) : 0;
      return `
        <div class="bar-row">
          <div class="bar-label">${hourLabel(r.hour)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:#54A0FF"></div></div>
          <div class="bar-num" style="color:#54A0FF">${fmt(r.guests)}</div>
        </div>`;
    }).join('');
    document.getElementById('peak-hours').innerHTML = rows;
  }

  function renderResidence(byResidence) {
    if (!byResidence || !byResidence.length) {
      document.getElementById('top-residence').innerHTML = '<div class="empty">No data yet.</div>';
      return;
    }
    const max = Math.max(...byResidence.map(r => r.guests));
    const rows = byResidence.map(r => {
      const label = r.district
        ? `${r.district}${r.resort ? ' · ' + r.resort : ''}`
        : r.residence;
      const w = max ? Math.round((r.guests / max) * 100) : 0;
      return `
        <div class="bar-row">
          <div class="bar-label" title="${label}">${label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:#FF9F43"></div></div>
          <div class="bar-num" style="color:#FF9F43">${fmt(r.guests)}</div>
        </div>`;
    }).join('');
    document.getElementById('top-residence').innerHTML = rows;
  }

  function renderTrend(byDay) {
    const tbody = document.getElementById('trend-body');
    if (!byDay || !byDay.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">No data yet.</td></tr>';
      return;
    }
    tbody.innerHTML = [...byDay].reverse().map(r => `
      <tr>
        <td class="trend-date">
          ${r.visit_date}
          ${r.visit_date === today ? '<span class="today-badge">Today</span>' : ''}
        </td>
        <td class="trend-num">${fmt(r.guests)}</td>
        <td class="trend-ft">★ ${fmt(r.first_time)}</td>
      </tr>`).join('');
  }

</script>
</body>
</html>
